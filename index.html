<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MyClaw</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #c0392b;
    --accent-dark: #962d22;
    --accent-light: #e74c3c;
    --steel: #34495e;
    --steel-light: #5d7a94;
    --white-glass: rgba(255,255,255,.78);
    --bubble-bg: rgba(255,255,255,.9);
    --shadow-soft: 0 2px 12px rgba(40,60,80,.12);
    --radius: 18px;
    --input-h: 52px;
  }

  html, body {
    height: 100%; width: 100%;
    font-family: 'Quicksand', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(165deg, #d5dde5 0%, #9aabb8 40%, #6b7f8e 100%);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ---------- layout ---------- */
  #app {
    display: flex; flex-direction: column;
    height: 100%; max-width: 640px; margin: 0 auto;
    position: relative;
  }

  /* ---------- chat area ---------- */
  #chat-area {
    flex: 1; overflow-y: auto; padding: 16px 16px 0;
    display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: none;
  }
  #chat-area::-webkit-scrollbar { display: none; }

  .msg {
    max-width: 82%; padding: 10px 16px; flex-shrink: 0;
    border-radius: var(--radius); font-size: 15px; line-height: 1.55;
    word-break: break-word; animation: pop .25s ease-out;
    box-shadow: var(--shadow-soft);
  }
  .msg.ai {
    align-self: flex-start; background: var(--bubble-bg);
    color: #2c3e50; border-bottom-left-radius: 4px;
    position: relative; padding-right: 38px;
  }
  .msg.ai .speak-btn {
    position: absolute; top: 8px; right: 8px;
    width: 24px; height: 24px; border: none; background: none;
    cursor: pointer; opacity: .45; transition: opacity .15s;
    display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .msg.ai .speak-btn:hover { opacity: .85; }
  .msg.ai .speak-btn.speaking { opacity: 1; }
  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--steel), var(--steel-light));
    color: #fff; border-bottom-right-radius: 4px;
  }
  .msg.tool {
    align-self: flex-start; font-size: 12px;
    background: rgba(255,255,255,.5); color: #4a5568;
    border-radius: 10px; padding: 8px 12px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    white-space: pre-wrap; max-height: 120px; overflow-y: auto;
  }
  .msg.thinking {
    align-self: flex-start; background: var(--bubble-bg);
    border-bottom-left-radius: 4px; display: flex; gap: 5px; padding: 12px 20px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--steel-light); animation: bounce .6s infinite alternate; }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }

  @keyframes bounce { to { transform: translateY(-6px); opacity: .4; } }
  @keyframes pop { from { opacity: 0; transform: translateY(8px) scale(.96); } to { opacity: 1; transform: none; } }

  /* ---------- mascot ---------- */
  #mascot-wrap {
    display: flex; justify-content: center; align-items: center;
    flex: 1; min-height: 0; padding: 16px 0;
    transition: opacity .3s;
  }
  #mascot-wrap.hidden { opacity: 0; height: 0; padding: 0; overflow: hidden; flex: 0; }
  #mascot-img { max-width: 80%; max-height: 100%; width: auto; height: auto; object-fit: contain; border-radius: 16px; filter: drop-shadow(0 8px 24px rgba(30,50,70,.3)); animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

  /* ---------- bottom bar ---------- */
  #bottom-bar {
    flex-shrink: 0; padding: 10px 14px 20px;
    display: flex; gap: 10px; align-items: flex-end;
    background: linear-gradient(transparent, rgba(40,60,80,.08));
  }
  #msg-input {
    flex: 1; min-height: var(--input-h); max-height: 140px;
    border: none; outline: none; resize: none; overflow-y: auto;
    border-radius: 22px; padding: 14px 20px;
    font-size: 15px; line-height: 1.45; color: #2c3e50;
    font-family: inherit; word-break: break-word;
    background: var(--white-glass);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    box-shadow: inset 0 1px 3px rgba(0,0,0,.06);
    transition: box-shadow .2s;
  }
  #msg-input::placeholder { color: #8899a6; }
  #msg-input:focus { box-shadow: inset 0 1px 3px rgba(0,0,0,.06), 0 0 0 2px rgba(192,57,43,.3); }
  #msg-input::-webkit-scrollbar { width: 3px; }
  #msg-input::-webkit-scrollbar-thumb { background: rgba(60,80,100,.25); border-radius: 2px; }

  .circle-btn {
    width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s, box-shadow .15s; flex-shrink: 0;
  }
  .circle-btn:active { transform: scale(.9); }
  .circle-btn svg { pointer-events: none; }

  #btn-mic {
    background: var(--white-glass);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    box-shadow: var(--shadow-soft);
  }
  #btn-mic.recording { background: var(--accent); animation: pulse 1s infinite; }
  #btn-mic.recording svg path { fill: #fff; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,.4); } 50% { box-shadow: 0 0 0 10px rgba(192,57,43,0); } }

  #btn-send {
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    box-shadow: 0 3px 10px rgba(192,57,43,.3);
  }

  /* scrollbar for tool msgs */
  .msg.tool::-webkit-scrollbar { width: 3px; }
  .msg.tool::-webkit-scrollbar-thumb { background: rgba(60,80,100,.3); border-radius: 2px; }

  @media (min-width: 521px) {
    #app { border-left: 1px solid rgba(255,255,255,.2); border-right: 1px solid rgba(255,255,255,.2); }
    #mascot-img { max-width: 420px; }
    .msg { font-size: 15.5px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Chat messages -->
  <div id="chat-area"></div>

  <!-- Mascot -->
  <div id="mascot-wrap">
    <img id="mascot-img" src="/mascot.png" alt="OpenClaw Mascot"/>
  </div>

  <!-- Input bar -->
  <div id="bottom-bar">
    <button class="circle-btn" id="btn-mic" title="语音输入">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z" fill="#c0392b"/><path d="M19 10v2a7 7 0 01-14 0v-2" stroke="#c0392b" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="23" stroke="#c0392b" stroke-width="1.8" stroke-linecap="round"/><line x1="8" y1="23" x2="16" y2="23" stroke="#c0392b" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
    <textarea id="msg-input" rows="1" placeholder="说点什么吧…" autocomplete="off"></textarea>
    <button class="circle-btn" id="btn-send" title="发送">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M5 12l-2 8 19-8L3 4l2 8zm0 0h7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<script>
(() => {
  const chatArea  = document.getElementById('chat-area');
  const mascot    = document.getElementById('mascot-wrap');
  const input     = document.getElementById('msg-input');
  const btnSend   = document.getElementById('btn-send');
  const btnMic    = document.getElementById('btn-mic');

  let hasMessages = false;

  /* ---- helpers ---- */
  function addMsg(type, text) {
    const el = document.createElement('div');
    el.className = 'msg ' + type;
    el.textContent = text;
    if (type === 'ai' && window.speechSynthesis) {
      el.appendChild(makeSpeakBtn(text));
    }
    chatArea.appendChild(el);
    chatArea.scrollTop = chatArea.scrollHeight;
    if (!hasMessages) { mascot.classList.add('hidden'); hasMessages = true; }
    return el;
  }

  function addThinking() {
    const el = document.createElement('div');
    el.className = 'msg thinking';
    el.id = 'thinking';
    el.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
    chatArea.appendChild(el);
    chatArea.scrollTop = chatArea.scrollHeight;
    return el;
  }

  function removeThinking() {
    const el = document.getElementById('thinking');
    if (el) el.remove();
  }

  /* ---- TTS ---- */
  let voices = [];
  function loadVoices() {
    voices = speechSynthesis.getVoices();
  }
  if (window.speechSynthesis) {
    loadVoices();
    speechSynthesis.addEventListener('voiceschanged', loadVoices);
  }

  function speak(text) {
    if (!window.speechSynthesis || !text) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN'; u.rate = 1.05;
    const zh = voices.find(v => v.lang.startsWith('zh'));
    if (zh) u.voice = zh;
    speechSynthesis.speak(u);
  }

  function makeSpeakBtn(text) {
    const btn = document.createElement('button');
    btn.className = 'speak-btn';
    btn.title = '朗读';
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M11 5L6 9H2v6h4l5 4V5z" fill="#c0392b"/><path d="M15.54 8.46a5 5 0 010 7.07" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/></svg>';
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      speak(text);
      btn.classList.add('speaking');
      const onEnd = () => { btn.classList.remove('speaking'); };
      speechSynthesis.addEventListener('end', onEnd, { once: true });
    });
    return btn;
  }

  /* ---- Speech recognition ---- */
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let isRecording = false;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.interimResults = true;
    recognition.continuous = false;

    recognition.addEventListener('result', e => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
      input.value = transcript;
      autoResize();
    });
    recognition.addEventListener('end', () => { isRecording = false; btnMic.classList.remove('recording'); });
    recognition.addEventListener('error', () => { isRecording = false; btnMic.classList.remove('recording'); });
  }

  btnMic.addEventListener('click', () => {
    if (!recognition) { alert('当前浏览器不支持语音识别，请使用 Chrome / Edge'); return; }
    if (isRecording) { recognition.stop(); return; }
    isRecording = true;
    btnMic.classList.add('recording');
    recognition.start();
  });

  /* ---- send ---- */
  let sending = false;

  async function send() {
    const text = input.value.trim();
    if (!text || sending) return;
    sending = true;
    input.value = '';
    input.style.height = 'auto';
    addMsg('user', text);
    const thinkEl = addThinking();

    const TIMEOUT_MS = 180000;
    const ac = new AbortController();
    const timer = setTimeout(() => ac.abort(), TIMEOUT_MS);

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
        signal: ac.signal,
      });
      clearTimeout(timer);

      const raw = await res.text();
      const trimmed = raw.trim();
      removeThinking();

      let data;
      try { data = JSON.parse(trimmed); } catch (_) {
        addMsg('ai', `服务器返回非 JSON（${res.status}）。请确认已用 http:// 访问本页且 Flask 已启动。`);
        return;
      }

      if (!res.ok && data.message) {
        addMsg('ai', data.message || `请求失败（${res.status}）`);
        return;
      }
      if (!data.steps || !Array.isArray(data.steps)) {
        addMsg('ai', data.message || '响应格式异常，请查看终端日志。');
        return;
      }

      for (const step of data.steps) {
        if (step.type === 'ai') {
          addMsg('ai', step.content);
        } else if (step.type === 'tool_call') {
          addMsg('tool', `🔧 ${step.name}(${JSON.stringify(step.args)})`);
        } else if (step.type === 'cmd') {
          const preview = step.content.length > 300 ? step.content.slice(0, 300) + '…' : step.content;
          addMsg('tool', `📋 ${step.name} → ${preview}`);
        }
      }
    } catch (err) {
      clearTimeout(timer);
      removeThinking();
      if (err.name === 'AbortError') {
        addMsg('ai', '请求超时（已等待 3 分钟），服务可能仍在处理中。请稍后重试或检查终端日志。');
      } else {
        addMsg('ai', `无法连接服务：${err && err.message ? err.message : String(err)}。请确认服务已运行（uv run python myclaw.py）且通过 http:// 访问页面。`);
      }
    } finally {
      sending = false;
    }
  }

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  }
  input.addEventListener('input', autoResize);

  btnSend.addEventListener('click', send);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
      e.preventDefault();
      send();
    }
  });

})();
</script>
</body>
</html>
